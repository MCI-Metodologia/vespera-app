<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VESPERA - Serie Orión</title>
    <style>
        body { background-color: #FFFDD0; font-family: 'Segoe UI', sans-serif; margin: 0; color: #4A4A4A; text-align: center; }
        header { background: linear-gradient(to right, #1E90FF, #87CEFA); padding: 20px; color: white; }
        .logo-top { height: 60px; margin-bottom: 10px; }
        .avatar-container { margin: 20px auto; width: 180px; height: 180px; border-radius: 50%; border: 5px solid #B8860B; overflow: hidden; background: white; }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; max-width: 500px; margin: auto; }
        .btn-menu { border: none; border-radius: 15px; padding: 20px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .blue { background-color: #4facfe; }
        .green { background-color: #00C2C2; }
        .yellow { background-color: #f6d365; color: #4A4A4A; }
        .gym-section { background: white; margin: 20px; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .footer-logo { height: 50px; margin-top: 20px; }
    </style>
</head>
<body>

<header>
    <img src="logo_vespera.png" alt="VESPERA" class="logo-top">
    <div>Serie Orión · MCI</div>
</header>

<div class="avatar-container">
    <img src="avatar_clara.png" alt="Clara" class="avatar-img">
</div>

<h1>¡Bienvenida, Lily!</h1>
<p>Tu mente es tu mayor activo</p>
<p>✨ Powered by Metodología MCI ✨</p>

<div class="gym-section">
    <h3>🧠 Gimnasio Mental</h3>
    <p id="ejercicio-texto">Presiona el botón para iniciar</p>
    <button class="btn-menu green" onclick="nuevoEjercicio()">Ejercitar mente</button>
</div>

<div class="grid-container">
    <button class="btn-menu blue">Conversemos</button>
    <button class="btn-menu blue">Mi Diario</button>
    <button class="btn-menu green">Cartelera Diaria</button>
    <button class="btn-menu yellow">Momento de Luz</button>
</div>

<footer>
    <img src="logo_mci.png" alt="MCI" class="footer-logo">
    <p>© 2026 MCI METODOLOGÍA DE CONCIENCIA INTEGRAL</p>
</footer>

<script>
    const ejercicios = [
        "Respira profundo 3 veces y visualiza tu meta de hoy.",
        "Escribe 3 cosas por las que estás agradecida hoy.",
        "Observa un objeto cercano y detalla 5 cualidades de él.",
        "Cierra los ojos y escucha 3 sonidos diferentes a tu alrededor."
    ];

    function nuevoEjercicio() {
        const azar = Math.floor(Math.random() * ejercicios.length);
        document.getElementById('ejercicio-texto').innerText = ejercicios[azar];
    }
</script>

</body>
</html>
